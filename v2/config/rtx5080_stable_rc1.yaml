# ============================================================
# OldTimeRadio v2.0 — Hardware Profile: RTX 5080 Stable RC1
# ============================================================
#
# Target: RTX 5080 16GB Blackwell / Win11 / CUDA 13.x / Torch 2.8+
#
# This file is the single source of truth for generation parameters.
# SceneAnimator reads it at startup. Do not hardcode these values
# in node code — always reference this config.
#
# Validated on: RTX 5080 Laptop, 16GB VRAM, Blackwell sm_120
# ============================================================

profile: rtx5080_stable_rc1

# --- VRAM Budget ---
vram_total_gb: 16.0
vram_ceiling_gb: 14.5        # Real-world target (Windows DWM + CUDA context steal ~1.5 GB)
vram_alarm_gb: 14.3          # Abort threshold — dry-run fails if peak exceeds this

# --- Image Model (Phase A: Anchor Stills) ---
image_model: sd3.5_large_fp8_scaled.safetensors
image_model_peak_gb: 12.0    # Observed Run #1-3
anchor_resolution: 1024x1024
anchor_steps: 20
anchor_cfg: 3.5
anchor_sampler: euler
anchor_scheduler: normal

# --- Video Model (Phase B: LTX-Video I2V Animation) ---
video_model: ltx-2.3-22b-distilled-fp8.safetensors
video_model_peak_gb: 14.1    # Validated on RTX 5080 FE (action plan Section 5)
video_precision: fp8_e4m3fn  # NEVER e5m2 — RT core artifacts on Blackwell
video_resolution: 768x512
video_num_frames: 65         # 2.6s at 25fps (must be 8*N+1)
video_fps: 25                # Generation fps
video_steps: 20
video_cfg: 3.5
video_sampler: euler
video_scheduler: normal
video_i2v_strength: 0.9      # Higher = more faithful to anchor image

# --- Output FPS (separate from generation fps) ---
# Tip: Generate at 25fps but output at 12fps to stretch runtime 2x.
# A 65-frame clip at 25fps = 2.6s. Same clip at 12fps = 5.4s.
# This is a legitimate trick when you need more runtime from fewer frames.
output_fps: 24               # Final MP4 frame rate for ProductionBus
output_fps_stretch: false    # Set true to halve output fps for 2x duration

# --- Scene Segmentation ---
scene_max_lines: 4           # Force scene break every N dialogue lines
scene_trigger_threshold: 8   # Only segment if total lines > this
scene_duration_range_s: [2.0, 4.0]  # Min/max seconds per animated clip

# --- Memory Boundary ---
boundary_sleep_s: 1.8        # Blackwell driver reclamation latency
boundary_sleep_defrag_s: 3.0 # Extended sleep every 10 scenes (driver fragmentation)
boundary_defrag_interval: 10 # Scenes between extended boundaries

# --- Character Consistency ---
character_consistency: textual_inversion  # .pt / .safetensors embedding
character_vram_overhead_mb: 50           # Max VRAM for TI embeddings

# --- Fallback ---
fallback_clip: input/signal_lost_prerender.mp4  # Static-noise clip on OOM

# --- Motion Control (future — v2.1+) ---
motion_control: disabled     # Do not implement in v2.0

# --- Forbidden in v2.0 ---
# IP-Adapter: +2.5 GB resident — non-starter at 14.5 GB ceiling
# Hunyuan co-residency: offline depth-map generator only (v2.1)
# 19B LTX variant: worse face temporal consistency
# Concurrent upscale: post-pass only (FILM)

# --- ComfyUI Startup Args ---
comfyui_args: --highvram --force-fp16 --cuda-malloc
